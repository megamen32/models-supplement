name: Build & Deploy

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["src/**", "package.json"]

permissions:
  contents: write

concurrency:
  group: build-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build supplement
        run: bun src/build.ts

      - name: Diff against previous build (regression gate)
        run: |
          if git cat-file -e HEAD:supplement.json; then
            git show HEAD:supplement.json > /tmp/prev-supplement.json
            bun src/diff.ts /tmp/prev-supplement.json supplement.json 30
          else
            echo "No previous supplement.json in HEAD — skipping regression gate."
          fi

      - name: Commit supplement.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add supplement.json
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "chore: refresh supplement.json"
            git push
          else
            echo "No changes."
          fi

      - name: Prepare public artifact
        run: |
          mkdir -p public
          cp supplement.json public/
          cp .nojekyll public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: false
